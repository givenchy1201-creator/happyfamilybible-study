
name: 自動更新首頁文章列表

on:
  push:
    branches: [ main ]
    paths:
      - 'bible/**'
      - 'groups/**'
      - 'devotion/**'
      - 'media/**'

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 更新首頁文章列表
        run: python3 build_index.py

      - name: 提交更新後的首頁
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "自動更新首頁文章列表"
          git push
